services:
  postgres:
    image: postgres:18-alpine
    container_name: oracle_stocks_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-oracle_stocks}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-oracle_stocks}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
